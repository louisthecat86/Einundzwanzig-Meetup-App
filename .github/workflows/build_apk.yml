name: Build Android APK

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'            # Versionierte Releases bei Tags wie v1.0.0
  workflow_dispatch:

# Berechtigung zum Erstellen/Aktualisieren von Releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # 1. Java Setup
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 2. Android SDK Tools bereitstellen
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 3. Flutter Setup
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 4. Android Versionen installieren
    - name: Install Android SDK & NDK
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-36" "build-tools;35.0.0" "ndk;27.0.12077973"

    # 5. Abhängigkeiten laden
    - name: Clean & Get Dependencies
      run: |
        flutter clean
        flutter pub get

    # 6. Bauen (Obfuscation aktiviert)
    - name: Build APK
      run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

    # 7. APK mit Versionsnummer + Datum umbenennen
    - name: Rename APK
      run: |
        VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
        DATE=$(date +%Y%m%d)
        cp build/app/outputs/flutter-apk/app-release.apk \
           build/app/outputs/flutter-apk/einundzwanzig-meetup-v${VERSION}-${DATE}.apk

    # 8. Als Artifact hochladen (Backup)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: einundzwanzig-app-release
        path: build/app/outputs/flutter-apk/app-release.apk

    # 9. Debug-Symbole sichern
    - name: Upload Debug Symbols
      uses: actions/upload-artifact@v4
      with:
        name: debug-symbols
        path: build/debug-info/

    # 10. Rolling Release aktualisieren (bei jedem Push auf main)
    - name: Update Latest Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "Neueste Version (automatisch)"
        body: |
          **Automatisch generierte APK** vom letzten Commit auf `main`.

          Commit: ${{ github.sha }}
          Datum: ${{ github.event.head_commit.timestamp }}

          ### Installation
          1. APK herunterladen
          2. Auf Android-Gerät übertragen
          3. "Aus unbekannten Quellen installieren" erlauben
          4. APK antippen → Installieren

          _Dieser Release wird bei jedem Push auf `main` automatisch aktualisiert._
        files: |
          build/app/outputs/flutter-apk/einundzwanzig-meetup-*.apk
        prerelease: true
        make_latest: true

    # 11. Versionierter Release (bei Tag-Push wie v1.0.0)
    - name: Create Versioned Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        name: "Release ${{ github.ref_name }}"
        body: |
          ## Einundzwanzig Meetup App ${{ github.ref_name }}

          ### Download
          Die APK unten herunterladen und auf dem Android-Gerät installieren.

          ### Änderungen
          Siehe Commit-Historie seit dem letzten Release.
        files: |
          build/app/outputs/flutter-apk/einundzwanzig-meetup-*.apk
        prerelease: false
        make_latest: true
